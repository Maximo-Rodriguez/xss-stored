<!DOCTYPE html>
<html>
<head>
    <title>Stored XSS Lab - Vulnerable</title>
</head>
<body>

<h2>Stored XSS Lab - Vulnerable Version</h2>

<input id="input" placeholder="Write a comment">
<button onclick="addComment()">Add Comment</button>

<h3>Comments:</h3>
<div id="comments"></div>

<script>
let comments = [];

function addComment() {
    let value = document.getElementById("input").value;

    // Simulated storage/database
    comments.push(value);

    render();

    document.getElementById("input").value = "";
}

function render() {
    let container = document.getElementById("comments");

    // Clear the visible comment area before rendering again
    container.innerHTML = "";

    // Vulnerable: renders stored user input as HTML
    for (let c of comments) {
        container.innerHTML += "<p>" + c + "</p>";
    }
}
</script>

</body>
</html>
